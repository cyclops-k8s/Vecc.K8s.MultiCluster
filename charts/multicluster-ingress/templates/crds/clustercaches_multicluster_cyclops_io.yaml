{{- if .Values.crds.enabled }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clustercaches.multicluster.cyclops.io
spec:
  group: multicluster.cyclops.io
  names:
    kind: ClusterCache
    listKind: ClusterCacheList
    plural: clustercaches
    singular: clustercache
  scope: Namespaced
  versions:
  - name: v1alpha
    schema:
      openAPIV3Schema:
        properties:
          lastHeartbeat:
            type: string
          hostnames:
            items:
              properties:
                hostname:
                  type: string
                hostIPs:
                  items:
                    properties:
                      iPAddress:
                        type: string
                      priority:
                        format: int32
                        type: integer
                      weight:
                        format: int32
                        type: integer
                      clusterIdentifier:
                        type: string
                    type: object
                  type: array
              type: object
            type: array
          serviceEndpointCounts:
            items:
              properties:
                namespace:
                  type: string
                service:
                  type: string
                count:
                  format: int32
                  type: integer
              type: object
            type: array
        type: object
    served: true
    storage: true
{{- end }}
