{{- if .Values.crds.enabled }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: hostnamecaches.multicluster.cyclops.io
spec:
  group: multicluster.cyclops.io
  names:
    kind: HostnameCache
    listKind: HostnameCacheList
    plural: hostnamecaches
    singular: hostnamecache
  scope: Namespaced
  versions:
  - name: v1alpha
    schema:
      openAPIV3Schema:
        properties:
          addresses:
            items:
              properties:
                ipAddress:
                  type: string
                priority:
                  format: int32
                  type: integer
                weight:
                  format: int32
                  type: integer
                clusterIdentifier:
                  type: string
              type: object
            type: array
          hostname:
            nullable: true
            type: string
        type: object
    served: true
    storage: true
{{- end }}
