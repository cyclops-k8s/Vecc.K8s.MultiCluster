{{- if .Values.crds.enabled }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: resourcecaches.multicluster.cyclops.io
spec:
  group: multicluster.cyclops.io
  names:
    kind: ResourceCache
    listKind: ResourceCacheList
    plural: resourcecaches
    singular: resourcecache
  scope: Namespaced
  versions:
  - name: v1alpha
    schema:
      openAPIV3Schema:
        properties:
          currentResourceVersion:
            type: string
        type: object
    served: true
    storage: true
{{- end }}
